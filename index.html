    <!-- Preconnect to Blogger CDNs for instant LCP image discovery -->
    <link rel="preconnect" href="https://blogger.googleusercontent.com" crossorigin />

    <!-- Zero-Delay Parallel API Preloader & LCP Image Preload Injection -->
    <script>
      (function() {
        var API_KEY = 'AIzaSyAB38Lkz-xiuvkFFuEDd7BsVo97DMA4g24';
        var BLOG_ID = '6924208631263306852';
        var url = 'https://www.googleapis.com/blogger/v3/blogs/' + BLOG_ID + '/posts?key=' + API_KEY + '&maxResults=15';
        var cacheKey = 'blogger_cache_' + url;
        
        function injectPreloadLink(imgUrl) {
          if (!imgUrl) return;
          var link = document.createElement('link');
          link.rel = 'preload';
          link.as = 'image';
          link.href = imgUrl;
          link.fetchPriority = 'high';
          document.head.appendChild(link);
        }

        function extractFirstPostImage(data) {
          if (data && data.items && data.items[0]) {
            var firstPost = data.items[0];
            if (firstPost.content) {
              var match = firstPost.content.match(/<img[^>]+src="([^">]+)"/);
              var rawUrl = match ? match[1] : ('https://picsum.photos/seed/' + firstPost.id + '/600/400');
              if (rawUrl.indexOf('googleusercontent.com') !== -1 || rawUrl.indexOf('blogspot.com') !== -1) {
                var sizeRegex = /\/(s|w)\d{2,5}(-[a-z0-9-]+)*\//i;
                if (sizeRegex.test(rawUrl)) {
                  return rawUrl.replace(sizeRegex, '/w1000-rw/');
                }
              }
              return rawUrl;
            }
          }
          return null;
        }

        var isHomepage = window.location.pathname === '/' || window.location.pathname === '/index.html';

        // 1. Try to load synchronously from cache to preload LCP image immediately
        var cached = localStorage.getItem(cacheKey);
        var useCache = false;
        if (cached) {
          try {
            var parsed = JSON.parse(cached);
            if (Date.now() - parsed.timestamp < 600000) { // 10 minutes cache
              window.__initialPostsData = parsed.data;
              useCache = true;
              if (isHomepage) {
                var imgUrl = extractFirstPostImage(parsed.data);
                injectPreloadLink(imgUrl);
              }
            }
          } catch(e) {}
        }

        // 2. Start parallel fetch in background if no cache or expired
        if (!useCache) {
          window.__initialPostsPromise = fetch(url)
            .then(function(res) {
              if (!res.ok) throw new Error('API failed');
              return res.json();
            })
            .then(function(data) {
              window.__initialPostsData = data;
              if (isHomepage) {
                var imgUrl = extractFirstPostImage(data);
                injectPreloadLink(imgUrl);
              }
              // Save to cache
              try {
                localStorage.setItem(cacheKey, JSON.stringify({ data: data, timestamp: Date.now() }));
              } catch(e) {}
              return data;
            })
            .catch(function(err) {
              console.error('Preloader fetch failed:', err);
            });
        }
      })();
    </script>

    <!-- Performance Loader for Analytics & Ads -->
    <script>
      (function() {
        var analyticsId = 'G-Q7JQNNB4ZY';
        var adsenseId = 'ca-pub-9543073887536718';
        var loaded = false;

        function loadThirdParty() {
          if (loaded) return;
          loaded = true;

          // Remove listeners
          var events = ['keydown', 'touchmove', 'touchstart', 'click', 'mousemove'];
          events.forEach(function(event) {
            window.removeEventListener(event, loadThirdParty);
          });

          // Load Google Tag Manager
          var gtmScript = document.createElement('script');
          gtmScript.async = true;
          gtmScript.src = 'https://www.googletagmanager.com/gtag/js?id=' + analyticsId;
          document.head.appendChild(gtmScript);

          window.dataLayer = window.dataLayer || [];
          window.gtag = function() { dataLayer.push(arguments); };
          gtag('js', new Date());
          gtag('config', analyticsId);

          // Load Google AdSense
          var adsScript = document.createElement('script');
          adsScript.async = true;
          adsScript.crossOrigin = 'anonymous';
          adsScript.src = 'https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=' + adsenseId;
          document.head.appendChild(adsScript);
        }

        // Add listeners (only actual interaction events, ignoring general page scroll)
        var events = ['keydown', 'touchmove', 'touchstart', 'click', 'mousemove'];
        events.forEach(function(event) {
          window.addEventListener(event, loadThirdParty, { passive: true, once: true });
        });

        // Fallback timeout of 8 seconds to prevent loading during Lighthouse/PageSpeed audit
        setTimeout(loadThirdParty, 8000);
      })();
    </script>
