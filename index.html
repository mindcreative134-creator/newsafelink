    <!-- Performance Loader for Analytics & Ads -->
    <script>
      (function() {
        var analyticsId = 'G-Q7JQNNB4ZY';
        var adsenseId = 'ca-pub-9543073887536718';
        var loaded = false;

        function loadThirdParty() {
          if (loaded) return;
          loaded = true;

          // Remove listeners
          var events = ['mouseover', 'keydown', 'touchmove', 'touchstart', 'scroll'];
          events.forEach(function(event) {
            window.removeEventListener(event, loadThirdParty);
          });

          // Load Google Tag Manager
          var gtmScript = document.createElement('script');
          gtmScript.async = true;
          gtmScript.src = 'https://www.googletagmanager.com/gtag/js?id=' + analyticsId;
          document.head.appendChild(gtmScript);

          window.dataLayer = window.dataLayer || [];
          window.gtag = function() { dataLayer.push(arguments); };
          gtag('js', new Date());
          gtag('config', analyticsId);

          // Load Google AdSense
          var adsScript = document.createElement('script');
          adsScript.async = true;
          adsScript.crossOrigin = 'anonymous';
          adsScript.src = 'https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=' + adsenseId;
          document.head.appendChild(adsScript);
        }

        // Add listeners
        var events = ['mouseover', 'keydown', 'touchmove', 'touchstart', 'scroll'];
        events.forEach(function(event) {
          window.addEventListener(event, loadThirdParty, { passive: true, once: true });
        });

        // Fallback timeout of 3.5 seconds
        setTimeout(loadThirdParty, 3500);
      })();
    </script>
