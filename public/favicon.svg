<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#4f46e5"/>
      <stop offset="100%" stop-color="#7c3aed"/>
    </linearGradient>
    <linearGradient id="arrow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="1"/>
      <stop offset="100%" stop-color="#c4b5fd" stop-opacity="0.9"/>
    </linearGradient>
  </defs>
  <!-- Rounded square background -->
  <rect width="64" height="64" rx="14" ry="14" fill="url(#bg)"/>
  <!-- Subtle inner highlight -->
  <rect x="1" y="1" width="62" height="31" rx="13" ry="13" fill="white" fill-opacity="0.06"/>
  <!-- Trending chart icon: line going up-right -->
  <polyline points="10,46 24,30 34,38 54,16" stroke="url(#arrow)" stroke-width="5" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  <!-- Arrow tip at top-right -->
  <polyline points="44,16 54,16 54,26" stroke="url(#arrow)" stroke-width="5" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  <!-- Small dot at start -->
  <circle cx="10" cy="46" r="3" fill="white" fill-opacity="0.7"/>
</svg>